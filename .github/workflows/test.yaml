name: Run Tests

on:
  push:
    branches: [New_API_cons_to_multichqc]
  pull_request:
    branches: [New_API_cons_to_multichqc]

jobs: 
  test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src
      CI: "true"

    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy torch matplotlib pyyaml h5py

      - name: Install SignalSnap-PyTorch
        run: |
          pip install -e .
      
      - name: Verify import
        run: |
          python -c "import multichss; print('SignalSnap-PyTorch import successful')"

      - name: Run example scripts
        run: |
          pytest tests/ --tb=short -v