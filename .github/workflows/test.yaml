name: Run Tests

on:
  push:
    branches: [New_API_cons_to_multichqc]
  pull_request:
    branches: [New_API_cons_to_multichqc]

jobs: 
  test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src
      CI: "true"

    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      
      - name: Install SignalSnap-PyTorch with dependencies
        run: |
          pip install -e ".[test]"
      
      - name: Verify import
        run: |
          python -c "import multichss; print('SignalSnap-PyTorch import successful')"

      - name: Run example scripts
        run: |
          pytest tests/ --tb=short -v
